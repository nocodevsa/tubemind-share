<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TubeMind – Shared Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b14;--s1:#0e1120;--s2:#161929;--s3:#1e2235;
  --border:rgba(255,255,255,0.07);--text:#eef0f8;
  --muted:#5b6480;--muted2:#8892b0;
  --accent:#7c3aed;--gold:#f59e0b;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  min-height:100vh;padding:0;}

/* bg */
.bg-glow{position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 50% at 50% -10%,rgba(124,58,237,.15) 0%,transparent 60%)}

/* header */
.header{padding:20px 28px;border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(26,10,62,.5),transparent);
  display:flex;align-items:center;justify-content:space-between;position:relative;z-index:2}
.logo{display:flex;align-items:center;gap:10px}
.logo-ico{width:36px;height:36px;background:linear-gradient(135deg,#6d28d9,#db2777);
  border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 0 20px rgba(109,40,217,.4)}
.logo-name{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;
  background:linear-gradient(to right,#fff,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-tag{font-size:10px;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase}
.header-cta{background:linear-gradient(135deg,#7c3aed,#db2777);
  border:none;color:#fff;border-radius:10px;padding:9px 20px;
  font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;
  text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:opacity .2s}
.header-cta:hover{opacity:.85}

/* main */
.main{max-width:700px;margin:0 auto;padding:40px 20px;position:relative;z-index:2}

/* shared-by banner */
.shared-banner{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);
  border-radius:14px;padding:16px 20px;margin-bottom:28px;
  display:flex;align-items:center;gap:12px}
.sb-ico{font-size:28px}
.sb-title{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;color:var(--text)}
.sb-sub{font-size:13px;color:var(--muted);margin-top:2px}
.sb-count{margin-left:auto;background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.3);
  border-radius:20px;padding:4px 14px;font-size:13px;font-weight:600;color:#a78bfa;white-space:nowrap}

/* video list */
.video-grid{display:flex;flex-direction:column;gap:10px}
.vcard{display:flex;gap:14px;padding:14px;border-radius:12px;border:1px solid var(--border);
  background:var(--s1);align-items:center;transition:all .2s;text-decoration:none;
  position:relative;overflow:hidden}
.vcard::before{content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--accent);border-radius:3px 0 0 3px}
.vcard:hover{background:var(--s2);border-color:rgba(255,255,255,.12);transform:translateY(-1px)}
.vthumb{width:120px;height:68px;border-radius:8px;object-fit:cover;
  flex-shrink:0;background:var(--s3)}
.vinfo{flex:1;min-width:0}
.vtitle{font-size:14px;font-weight:600;color:var(--text);line-height:1.4;
  margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden}
.vchannel{font-size:12px;color:var(--muted)}
.vwatch{flex-shrink:0;background:var(--accent);color:#fff;border:none;
  border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;
  text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:opacity .2s}
.vwatch:hover{opacity:.85}

/* install banner */
.install-banner{margin-top:36px;background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(219,39,119,.08));
  border:1px solid rgba(124,58,237,.25);border-radius:16px;padding:28px 24px;text-align:center}
.ib-ico{font-size:40px;margin-bottom:10px}
.ib-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--text);margin-bottom:6px}
.ib-sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:20px;max-width:420px;margin-left:auto;margin-right:auto}
.ib-btn{display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#7c3aed,#db2777);
  color:#fff;border:none;border-radius:12px;padding:13px 28px;
  font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;
  text-decoration:none;transition:opacity .2s;box-shadow:0 8px 30px rgba(124,58,237,.3)}
.ib-btn:hover{opacity:.9}
.ib-features{display:flex;justify-content:center;gap:20px;margin-top:18px;flex-wrap:wrap}
.ib-feat{font-size:12px;color:var(--muted2);display:flex;align-items:center;gap:5px}

/* error / loading */
.state-box{text-align:center;padding:80px 20px}
.state-ico{font-size:48px;margin-bottom:16px}
.state-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;margin-bottom:8px}
.state-sub{font-size:14px;color:var(--muted);line-height:1.6}

/* footer */
.footer{text-align:center;padding:32px 20px;font-size:12px;color:var(--muted);
  border-top:1px solid var(--border);margin-top:40px;position:relative;z-index:2}
.footer a{color:var(--muted2);text-decoration:none}
.footer a:hover{color:var(--text)}
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="header">
  <div class="logo">
    <div class="logo-ico">🧠</div>
    <div>
      <div class="logo-name">TubeMind</div>
      <div class="logo-tag">Smart YouTube Library</div>
    </div>
  </div>
  <a class="header-cta" href="https://chromewebstore.google.com/detail/tubemind-%E2%80%93-youtube-video/lmbkkdjlomingooelakgoldkmjbefchh" target="_blank">
    ➕ Get Extension — Free
  </a>
</div>

<div class="main">
  <div id="content">
    <div class="state-box">
      <div class="state-ico">⏳</div>
      <div class="state-title">Loading collection…</div>
      <div class="state-sub">Decoding shared videos</div>
    </div>
  </div>
</div>

<div class="footer">
  <p>Made with 🧠 <a href="https://chromewebstore.google.com/detail/tubemind-%E2%80%93-youtube-video/lmbkkdjlomingooelakgoldkmjbefchh">TubeMind</a> — Smart YouTube Organizer &nbsp;·&nbsp; <a href="https://nocodevsa.github.io/tubemind-privacy">Privacy Policy</a></p>
</div>

<script>
function decode() {
  const hash = window.location.hash.slice(1);
  if (!hash) return null;
  try {
    return JSON.parse(decodeURIComponent(escape(atob(hash))));
  } catch(e) {
    return null;
  }
}

function render() {
  const data = decode();
  const content = document.getElementById("content");

  if (!data || !data.videos || !data.videos.length) {
    content.innerHTML = `
      <div class="state-box">
        <div class="state-ico">😕</div>
        <div class="state-title">Invalid or empty share link</div>
        <div class="state-sub">This link may be broken or expired.<br>Ask the sender for a new one.</div>
      </div>`;
    return;
  }

  const catLabel = data.cat || "Shared Collection";
  const count    = data.videos.length;

  const cards = data.videos.map(v => {
    const videoId = extractVideoId(v.url || "");
    const thumb   = videoId
      ? `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`
      : "";
    return `
      <a class="vcard" href="${esc(v.url)}" target="_blank" rel="noopener">
        ${thumb ? `<img class="vthumb" src="${esc(thumb)}" alt="" onerror="this.style.display='none'">` : ""}
        <div class="vinfo">
          <div class="vtitle">${esc(v.title || "Untitled")}</div>
          <div class="vchannel">${esc(v.channel || "")}</div>
        </div>
        <span class="vwatch">▶ Watch</span>
      </a>`;
  }).join("");

  content.innerHTML = `
    <div class="shared-banner">
      <div class="sb-ico">📂</div>
      <div>
        <div class="sb-title">${esc(catLabel)}</div>
        <div class="sb-sub">Shared via TubeMind</div>
      </div>
      <div class="sb-count">${count} video${count !== 1 ? "s" : ""}</div>
    </div>
    <div class="video-grid">${cards}</div>
    <div class="install-banner">
      <div class="ib-ico">🧠</div>
      <div class="ib-title">Save these to your own TubeMind</div>
      <div class="ib-sub">Install the free Chrome extension and start organizing your YouTube library with categories, priorities, and mood-based watching.</div>
      <a class="ib-btn" href="https://chromewebstore.google.com/detail/tubemind-%E2%80%93-youtube-video/lmbkkdjlomingooelakgoldkmjbefchh" target="_blank">
        ➕ Install TubeMind Free
      </a>
      <div class="ib-features">
        <div class="ib-feat">✅ 100% Free</div>
        <div class="ib-feat">🔒 Data stays local</div>
        <div class="ib-feat">⚡ Instant setup</div>
        <div class="ib-feat">🎯 Mood-based watching</div>
      </div>
    </div>`;
}

function extractVideoId(url) {
  try {
    const u = new URL(url);
    return u.searchParams.get("v") || u.pathname.split("/").pop() || "";
  } catch { return ""; }
}

function esc(s) {
  return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

render();
</script>
</body>
</html>
